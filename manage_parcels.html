<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Parcels - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>🎓 Smart Parcel Management System</h1>
        <div class="header-right">
            <div class="user-info">
                <span id="userDisplay">👮 Admin</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="manage_parcels.html" class="active">Manage Parcels</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2 class="page-title">Manage Parcels</h2>

        <!-- SUCCESS MESSAGE -->
        <div class="success-message" id="successMessage">
            <h4>✓ Success!</h4>
            <p id="successText">Parcel status has been updated to "Delivered".</p>
        </div>

        <!-- FILTER & SEARCH SECTION -->
        <div class="filter-container">
            <div class="filter-group">
                <label for="dateFilter">📅 Select Date</label>
                <input type="date" id="dateFilter" onchange="filterParcels()">
            </div>

            <div class="search-group">
                <input type="text" id="searchInput" placeholder="🔍 Search by Parcel ID / Name / Phone / SAP ID" oninput="searchParcels()">
                <button class="btn btn-secondary" onclick="filterParcels()" style="margin-right: 0.75rem;">Search</button>
                <button class="btn btn-primary" onclick="clearFilters()">Clear Filters</button>
            </div>
        </div>

        <!-- PARCELS TABLE -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Parcel ID</th>
                        <th>Student Name</th>
                        <th>SAP ID</th>
                        <th>Phone</th>
                        <th>Source</th>
                        <th>Arrival Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="parcelTableBody">
                </tbody>
            </table>
        </div>

        <div id="noResultsMessage" class="no-results" style="display: none;">
            No parcels found. Try adjusting your filters or search terms.
        </div>
    </div>

    <script>
        // Sample parcel data
        const sampleParcels = [
            {
                id: '001',
                studentName: 'Rajesh Kumar',
                phone: '9876543210',
                source: 'Amazon',
                arrivalDate: '2026-04-07',
                status: 'Arrived'
            },
            {
                id: '002',
                studentName: 'Priya Singh',
                phone: '9876543211',
                source: 'Flipkart',
                arrivalDate: '2026-04-07',
                status: 'Arrived'
            },
            {
                id: '003',
                studentName: 'Amit Patel',
                phone: '9876543212',
                source: 'Myntra',
                arrivalDate: '2026-04-06',
                status: 'Delivered'
            },
            {
                id: '004',
                studentName: 'Neha Sharma',
                phone: '9765432101',
                source: 'Amazon',
                arrivalDate: '2026-04-05',
                status: 'Arrived'
            },
            {
                id: '005',
                studentName: 'Arjun Das',
                phone: '8765432101',
                source: 'Flipkart',
                arrivalDate: '2026-04-04',
                status: 'Delivered'
            },
            {
                id: '006',
                studentName: 'Kavya Nair',
                phone: '7765432101',
                source: 'Myntra',
                arrivalDate: '2026-04-07',
                status: 'Arrived'
            },
            {
                id: '007',
                studentName: 'Vikram Singh',
                phone: '9876543213',
                source: 'Amazon',
                arrivalDate: '2026-04-03',
                status: 'Delivered'
            },
            {
                id: '008',
                studentName: 'Pooja Verma',
                phone: '9876543214',
                source: 'Flipkart',
                arrivalDate: '2026-04-02',
                status: 'Arrived'
            }
        ];

        let parcels = sampleParcels;
        let filteredParcels = [...parcels];

        function checkAdminLogin() {
            const adminLogin = localStorage.getItem('adminLogin');
            if (!adminLogin) {
                window.location.href = 'admin_login.html';
                return;
            }

            const data = JSON.parse(adminLogin);
            document.getElementById('userDisplay').textContent = '👮 ' + data.username;
            loadParcels();
        }

        function logout() {
            localStorage.removeItem('adminLogin');
            window.location.href = 'role_selection.html';
        }

        function loadParcels() {
            const savedParcels = localStorage.getItem('parcels');
            if (savedParcels) {
                parcels = JSON.parse(savedParcels);
            } else {
                // First load: seed localStorage with sample data so dashboard stats sync correctly
                parcels = sampleParcels;
                localStorage.setItem('parcels', JSON.stringify(parcels));
            }
            filteredParcels = [...parcels];
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('parcelTableBody');
            const noResults = document.getElementById('noResultsMessage');
            const studentMappings = JSON.parse(localStorage.getItem('studentMappings')) || {};

            if (filteredParcels.length === 0) {
                tableBody.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            tableBody.innerHTML = filteredParcels.map((parcel, index) => {
                // Look up SAP ID from phone number
                const sapId = studentMappings[parcel.phone]?.sapId || 'N/A';
                
                const visibleId = parcel.id.split('-').pop();
                return `
                <tr>
                    <td>${visibleId}</td>
                    <td>${parcel.studentName}</td>
                    <td>${sapId}</td>
                    <td>${parcel.phone}</td>
                    <td>${parcel.source}</td>
                    <td>${parcel.arrivalDate}</td>
                    <td>
                        <span class="card-status status-${parcel.status.toLowerCase()}">
                            ${parcel.status}
                        </span>
                    </td>
                    <td>
                        ${parcel.status === 'Arrived' ? 
                            `<button class="btn btn-small btn-primary" onclick="markAsDelivered('${parcel.id}')">
                                Mark as Delivered
                            </button>` 
                            : 
                            `<span class="delivered-badge">✓ Delivered</span>`
                        }
                    </td>
                </tr>
            `;
            }).join('');
        }

        function markAsDelivered(parcelId) {
            const parcelIndex = parcels.findIndex(p => p.id === parcelId);
            if (parcelIndex !== -1) {
                parcels[parcelIndex].status = 'Delivered';
                parcels[parcelIndex].deliveryDate = new Date().toLocaleDateString('en-IN');
                localStorage.setItem('parcels', JSON.stringify(parcels));
                loadParcels();

                const successMessage = document.getElementById('successMessage');
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 3000);
            }
        }

        function normalizeDateValue(value) {
            if (!value) return '';
            const isoPattern = /^\d{4}-\d{2}-\d{2}$/;
            const ddmmyyyyPattern = /^\d{2}-\d{2}-\d{4}$/;
            if (isoPattern.test(value)) {
                return value;
            }
            if (ddmmyyyyPattern.test(value)) {
                const [day, month, year] = value.split('-');
                return `${year}-${month}-${day}`;
            }
            const parsedDate = new Date(value);
            return Number.isNaN(parsedDate.getTime()) ? '' : parsedDate.toISOString().split('T')[0];
        }

        function filterParcels() {
            const rawDateFilter = document.getElementById('dateFilter').value;
            const dateFilter = normalizeDateValue(rawDateFilter);
            const rawSearchFilter = document.getElementById('searchInput').value;
            const searchFilter = rawSearchFilter.trim().toLowerCase();
            const studentMappings = JSON.parse(localStorage.getItem('studentMappings')) || {};

            filteredParcels = parcels.filter(parcel => {
                const dateMatch = !dateFilter || parcel.arrivalDate === dateFilter;

                // Look up SAP ID for this phone
                const sapId = (studentMappings[parcel.phone]?.sapId || '').toLowerCase();
                const studentName = (parcel.studentName || '').toLowerCase();
                const phone = String(parcel.phone || '');
                const fullId = String(parcel.id || '').toLowerCase();
                const visibleId = fullId.split('-').pop();
                const parcelIdOnly = /^[0-9]{1,3}$/.test(searchFilter);

                const searchMatch = !searchFilter || 
                    (parcelIdOnly ? visibleId === searchFilter : (
                        studentName.includes(searchFilter) ||
                        phone.includes(searchFilter) ||
                        fullId.includes(searchFilter) ||
                        visibleId.includes(searchFilter) ||
                        sapId.includes(searchFilter)
                    ));

                return dateMatch && searchMatch;
            });

            renderTable();
        }

        function searchParcels() {
            filterParcels();
        }

        function clearFilters() {
            document.getElementById('dateFilter').value = '';
            document.getElementById('searchInput').value = '';
            filteredParcels = [...parcels];
            renderTable();
        }

        checkAdminLogin();
    </script>
</body>
</html>
