<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Handover - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>🎓 Smart Parcel Management System</h1>
        <div class="header-right">
            <div class="user-info">
                <span id="userDisplay">👮 Admin</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="manage_parcels.html">Manage Parcels</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2 class="page-title">Parcel Handover System</h2>

        <!-- SUCCESS MESSAGE -->
        <div class="success-message" id="handoverSuccessMessage">
            <h4>✓ Handover Confirmed!</h4>
            <p>Parcel has been successfully handed over.</p>
        </div>

        <!-- SEARCH SECTION -->
        <div class="search-container">
            <h3 style="margin-bottom: 1rem; color: #d32f2f;">Search Parcel</h3>
            <div class="search-form">
                <div class="form-group">
                    <label for="parcelNumberInput">Parcel Number</label>
                    <input type="text" id="parcelNumberInput" placeholder="Enter parcel ID" onkeyup="searchParcel()">
                </div>
            </div>
        </div>

        <!-- PARCEL DETAILS -->
        <div id="parcelDetailsSection" class="table-container" style="display: none;">
            <div style="padding: 2rem;">
                <h3 id="parcelIdHeader" style="color: #d32f2f; margin-bottom: 1rem;">Parcel Details</h3>
                
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem;">
                    <div>
                        <label style="font-weight: 600; color: #666;">Parcel ID:</label>
                        <p id="detailParcelId">-</p>
                    </div>
                    <div>
                        <label style="font-weight: 600; color: #666;">Student Name:</label>
                        <p id="detailStudentName">-</p>
                    </div>
                    <div>
                        <label style="font-weight: 600; color: #666;">Phone:</label>
                        <p id="detailPhone">-</p>
                    </div>
                    <div>
                        <label style="font-weight: 600; color: #666;">Status:</label>
                        <p id="detailStatus">-</p>
                    </div>
                </div>

                <button id="confirmHandoverBtn" class="btn btn-primary" onclick="confirmHandover()" style="width: 100%;">Confirm Handover</button>
            </div>
        </div>

        <!-- NO RESULTS MESSAGE -->
        <div id="noResultsMessage" class="no-results" style="display: none;">
            Parcel not found. Please check the parcel ID.
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let currentParcel = null;
        let allParcels = [];

        async function checkAdminLogin() {
            const adminLogin = localStorage.getItem('adminLogin');
            if (!adminLogin) {
                window.location.href = 'admin_login.html';
                return;
            }

            const data = JSON.parse(adminLogin);
            document.getElementById('userDisplay').textContent = '👮 ' + data.username;
            await loadAllParcels();
        }

        async function loadAllParcels() {
            try {
                const response = await fetch(`${API_BASE_URL}/parcels`);
                allParcels = await response.json();
            } catch (error) {
                console.error('Error loading parcels:', error);
            }
        }

        function logout() {
            localStorage.removeItem('adminLogin');
            window.location.href = 'role_selection.html';
        }

        function searchParcel() {
            const parcelNumber = document.getElementById('parcelNumberInput').value.trim().toUpperCase();
            const detailsSection = document.getElementById('parcelDetailsSection');
            const noResultsMessage = document.getElementById('noResultsMessage');

            if (!parcelNumber) {
                detailsSection.style.display = 'none';
                noResultsMessage.style.display = 'none';
                currentParcel = null;
                return;
            }

            // Search by parcel_id (full or partial)
            const parcel = allParcels.find(p => 
                String(p.parcel_id).toUpperCase() === parcelNumber ||
                String(p.parcel_id).split('-').pop() === parcelNumber
            );

            if (!parcel) {
                detailsSection.style.display = 'none';
                noResultsMessage.style.display = 'block';
                currentParcel = null;
                return;
            }

            currentParcel = parcel;

            document.getElementById('parcelIdHeader').textContent = `Parcel ${parcel.parcel_id}`;
            document.getElementById('detailParcelId').textContent = parcel.parcel_id;
            document.getElementById('detailStudentName').textContent = parcel.student_name;
            document.getElementById('detailPhone').textContent = parcel.phone;
            
            const statusElement = document.getElementById('detailStatus');
            statusElement.textContent = parcel.status;
            statusElement.className = `card-status status-${parcel.status.toLowerCase()}`;

            detailsSection.style.display = 'block';
            noResultsMessage.style.display = 'none';
            document.getElementById('handoverSuccessMessage').classList.remove('show');

            const confirmBtn = document.getElementById('confirmHandoverBtn');
            if (parcel.status === 'Delivered') {
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.5';
                confirmBtn.textContent = 'Already Delivered';
            } else {
                confirmBtn.disabled = false;
                confirmBtn.style.opacity = '1';
                confirmBtn.textContent = 'Confirm Handover';
            }
        }

        async function confirmHandover() {
            if (!currentParcel) return;

            try {
                const response = await fetch(`${API_BASE_URL}/parcels/${currentParcel.parcel_id}/deliver`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    const data = await response.json();
                    alert(data.error || 'Failed to update parcel');
                    return;
                }

                currentParcel.status = 'Delivered';

                const statusElement = document.getElementById('detailStatus');
                statusElement.textContent = 'Delivered';
                statusElement.className = 'card-status status-delivered';

                const successMessage = document.getElementById('handoverSuccessMessage');
                successMessage.classList.add('show');

                const confirmBtn = document.getElementById('confirmHandoverBtn');
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.5';
                confirmBtn.textContent = 'Already Delivered';

                // Refresh parcels list
                await loadAllParcels();

                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 4000);
            } catch (error) {
                console.error('Error updating parcel:', error);
                alert('Failed to connect to server');
            }
        }

        document.getElementById('parcelNumberInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchParcel();
            }
        });

        checkAdminLogin();
    </script>
</body>
</html>
