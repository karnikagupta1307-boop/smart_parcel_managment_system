<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Parcels - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>🎓 Smart Parcel Management System</h1>
        <div class="header-right">
            <div class="user-info">
                <span id="userDisplay">👨‍🎓 Student</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="student_dashboard.html" class="active">My Parcels</a>
        <a href="#" onclick="logout(); return false;">Logout</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2 class="page-title">My Parcels</h2>

        <div class="dashboard-welcome">
            <h3 id="welcomeMessage">Welcome, Student</h3>
            <p>Below are the parcels assigned to your account</p>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <h4>Total Parcels</h4>
                <strong id="totalCount">0</strong>
            </div>
            <div class="summary-card">
                <h4>Arrived</h4>
                <strong id="arrivedCount">0</strong>
            </div>
            <div class="summary-card">
                <h4>Delivered</h4>
                <strong id="deliveredCount">0</strong>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Parcel Number</th>
                        <th>Status</th>
                        <th>Arrival Date</th>
                        <th>Source</th>
                        <th>Delivery Date</th>
                    </tr>
                </thead>
                <tbody id="parcelTableBody"></tbody>
            </table>
        </div>

        <div id="emptyState" class="no-results" style="display: none;">
            No parcels found for your account
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        async function checkLogin() {
            const studentLogin = localStorage.getItem('studentLogin');
            if (!studentLogin) {
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const data = JSON.parse(studentLogin);
                if (!data.sap_id) {
                    // Invalid login data
                    localStorage.removeItem('studentLogin');
                    window.location.href = 'login.html';
                    return;
                }
                
                const studentName = data.name || 'Student';
                document.getElementById('userDisplay').textContent = '👨‍🎓 ' + studentName;
                document.getElementById('welcomeMessage').textContent = 'Welcome, ' + studentName;
                await loadStudentParcels(data.sap_id, data.phone);
            } catch (e) {
                console.error('Error parsing login data:', e);
                localStorage.removeItem('studentLogin');
                window.location.href = 'login.html';
            }
        }

        function logout() {
            localStorage.removeItem('studentLogin');
            window.location.href = 'role_selection.html';
        }

        async function loadStudentParcels(sapId, phone) {
            try {
                const response = await fetch(`${API_BASE_URL}/parcels/student?sap_id=${encodeURIComponent(sapId)}`);
                let parcels = await response.json();

                // If no parcels found by SAP ID, try by phone
                if (parcels.length === 0 && phone) {
                    const phoneResponse = await fetch(`${API_BASE_URL}/parcels/student?phone=${encodeURIComponent(phone)}`);
                    parcels = await phoneResponse.json();
                }

                renderParcels(parcels);
            } catch (error) {
                console.error('Error loading parcels:', error);
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('emptyState').textContent = 'Failed to load parcels. Please try again.';
            }
        }

        function renderParcels(parcels) {
            const tableBody = document.getElementById('parcelTableBody');
            const totalCount = document.getElementById('totalCount');
            const arrivedCount = document.getElementById('arrivedCount');
            const deliveredCount = document.getElementById('deliveredCount');
            const emptyState = document.getElementById('emptyState');

            totalCount.textContent = parcels.length;
            arrivedCount.textContent = parcels.filter(p => p.status === 'Arrived').length;
            deliveredCount.textContent = parcels.filter(p => p.status === 'Delivered').length;

            if (parcels.length === 0) {
                tableBody.innerHTML = '';
                emptyState.style.display = 'block';
                emptyState.textContent = 'No parcels found for your account';
                return;
            }

            emptyState.style.display = 'none';
            tableBody.innerHTML = parcels.map(parcel => `
                <tr>
                    <td><strong>${parcel.parcel_id}</strong></td>
                    <td><span class="card-status status-${parcel.status.toLowerCase()}">${parcel.status}</span></td>
                    <td>${formatDate(parcel.arrival_date)}</td>
                    <td>${parcel.source}</td>
                    <td>${parcel.delivery_date ? formatDate(parcel.delivery_date) : '-'}</td>
                </tr>
            `).join('');
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN');
        }

        checkLogin();
    </script>
</body>
</html>
