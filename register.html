<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>📝 Student Registration</h2>
            <p class="login-intro">Create your account to get started</p>
            
            <form onsubmit="handleStudentRegister(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" pattern="[a-zA-Z\s]{2,100}" required>
                </div>

                <div class="form-group">
                    <label for="sap_id">SAP ID (11 digits)</label>
                    <input type="text" id="sap_id" placeholder="12345678901" pattern="\d{11}" maxlength="11" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (10 digits)</label>
                    <input type="tel" id="phone" placeholder="9876543210" pattern="\d{10}" maxlength="10" required>
                </div>

                <div class="form-group">
                    <label for="password">Password (min 6 characters)</label>
                    <input type="password" id="password" placeholder="Create a password" minlength="6" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Register</button>
            </form>

            <p class="login-help">
                Already have an account? <a href="login.html" class="login-link">Login here</a>
            </p>

            <p class="login-help">
                <a href="role_selection.html" class="login-link">← Back to Role Selection</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        async function handleStudentRegister(event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            const sapId = document.getElementById('sap_id').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!name || !sapId || !phone || !password) {
                alert('Please fill in all fields');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/student/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        sap_id: sapId,
                        phone: phone,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || 'Registration failed');
                    return;
                }

                alert('Registration successful! Please login with your credentials.');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Registration error:', error);
                alert('Failed to connect to server. Please try again.');
            }
        }
    </script>
</body>
</html>
