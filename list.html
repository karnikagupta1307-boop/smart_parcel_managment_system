<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel List - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>🎓 Smart Parcel Management System</h1>
        <div class="header-right">
            <div class="user-info">
                <span id="userDisplay">👮 Admin</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="manage_parcels.html">Manage Parcels</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2 class="page-title">All Parcels</h2>

        <!-- SUCCESS MESSAGE -->
        <div class="success-message" id="statusMessage">
            <h4>✓ Status Updated!</h4>
            <p>Parcel status has been updated to "Delivered".</p>
        </div>

        <!-- PARCELS TABLE -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Parcel ID</th>
                        <th>Student Name</th>
                        <th>Phone</th>
                        <th>Source</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="parcelTableBody">
                </tbody>
            </table>
        </div>

        <div id="emptyState" class="no-results" style="display: none;">
            No parcels found in the system yet.
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let allParcels = [];

        async function checkAdminLogin() {
            const adminLogin = localStorage.getItem('adminLogin');
            if (!adminLogin) {
                window.location.href = 'admin_login.html';
                return;
            }

            const data = JSON.parse(adminLogin);
            document.getElementById('userDisplay').textContent = '👮 ' + data.username;
            await loadParcels();
        }

        function logout() {
            localStorage.removeItem('adminLogin');
            window.location.href = 'role_selection.html';
        }

        async function loadParcels() {
            try {
                const response = await fetch(`${API_BASE_URL}/parcels`);
                allParcels = await response.json();
                populateTable(allParcels);
            } catch (error) {
                console.error('Error loading parcels:', error);
                alert('Failed to load parcels from server');
            }
        }

        function populateTable(parcels) {
            const tableBody = document.getElementById('parcelTableBody');
            const emptyState = document.getElementById('emptyState');

            if (parcels.length === 0) {
                tableBody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tableBody.innerHTML = parcels.map((parcel) => `
                <tr>
                    <td><strong>${parcel.parcel_id}</strong></td>
                    <td>${parcel.student_name}</td>
                    <td>${parcel.phone}</td>
                    <td>${parcel.source}</td>
                    <td>
                        <span class="card-status status-${parcel.status.toLowerCase()}">
                            ${parcel.status}
                        </span>
                    </td>
                    <td>
                        ${parcel.status === 'Arrived' ? 
                            `<button class="btn btn-small btn-primary" onclick="markAsDelivered('${parcel.parcel_id}')">Mark as Delivered</button>` 
                            : 
                            `<span style="color: #999;">✓ Delivered</span>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function markAsDelivered(parcelId) {
            try {
                const response = await fetch(`${API_BASE_URL}/parcels/${parcelId}/deliver`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    const data = await response.json();
                    alert(data.error || 'Failed to update parcel');
                    return;
                }

                await loadParcels();

                const statusMessage = document.getElementById('statusMessage');
                statusMessage.classList.add('show');
                setTimeout(() => {
                    statusMessage.classList.remove('show');
                }, 3000);
            } catch (error) {
                console.error('Error updating parcel:', error);
                alert('Failed to connect to server');
            }
        }

        checkAdminLogin();
    </script>
</body>
</html>
