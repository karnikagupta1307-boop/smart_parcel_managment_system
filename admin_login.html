<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>👮 Admin Login</h2>
            <p class="login-intro">Enter your credentials to access the admin panel</p>

            <div id="errorMessage" style="background-color: #f8d7da; color: #721c24; padding: 0.8rem; border-radius: 6px; margin-bottom: 1.5rem; border-left: 4px solid #d32f2f; display: none;">
                Invalid username or password. Please try again.
            </div>

            <form id="loginForm" onsubmit="return handleAdminLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <p class="login-help" style="margin-top: 1.5rem;">
                <a href="role_selection.html" class="login-link">← Back to Role Selection</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        async function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('errorMessage');

            if (!username || !password) {
                errorMessage.textContent = 'Please enter both username and password';
                errorMessage.style.display = 'block';
                return false;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorMessage.textContent = data.error || 'Invalid credentials';
                    errorMessage.style.display = 'block';
                    return false;
                }

                errorMessage.style.display = 'none';

                localStorage.setItem('adminLogin', JSON.stringify({
                    ...data.user,
                    loginTime: new Date().toISOString()
                }));
                localStorage.removeItem('studentLogin');
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Failed to connect to server. Please try again.';
                errorMessage.style.display = 'block';
            }
            return false;
        }
    </script>
</body>
</html>
