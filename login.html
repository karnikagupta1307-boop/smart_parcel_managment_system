<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>👨‍🎓 Student Login</h2>
            <p class="login-intro">Enter your credentials to view your parcels</p>
            
            <form onsubmit="handleStudentLogin(event)">
                <div class="form-group">
                    <label for="sap_id">SAP ID (11 digits)</label>
                    <input type="text" id="sap_id" placeholder="Enter 11-digit SAP ID" pattern="\d{11}" maxlength="11" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <p class="login-help">
                Don't have an account? <a href="register.html" class="login-link">Register here</a>
            </p>

            <p class="login-help">
                <a href="role_selection.html" class="login-link">← Back to Role Selection</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        async function handleStudentLogin(event) {
            event.preventDefault();
            const sapId = document.getElementById('sap_id').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!sapId || !password) {
                alert('Please enter both SAP ID and Password');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/student/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sap_id: sapId, password: password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || 'Login failed. Please check your credentials.');
                    return;
                }

                // Store login data
                localStorage.setItem('studentLogin', JSON.stringify({
                    ...data.user,
                    loginTime: new Date().toISOString()
                }));
                
                // Redirect to student dashboard
                window.location.href = 'student_dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                alert('Failed to connect to server. Please try again.');
            }
        }

        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        handleStudentLogin(e);
                    }
                });
            }
        });
    </script>
</body>
</html>
