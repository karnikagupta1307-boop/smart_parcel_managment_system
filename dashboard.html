<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>🎓 Smart Parcel Management System</h1>
        <div class="header-right">
            <div class="user-info">
                <span id="userDisplay">👮 Admin</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="manage_parcels.html">Manage Parcels</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2 class="page-title">Admin Dashboard</h2>

        <!-- SUCCESS MESSAGE -->
        <div class="success-message" id="successMessage">
            <h4>✓ Success!</h4>
            <p>Parcel has been added successfully.</p>
        </div>

        <!-- STATISTICS -->
        <div class="summary-grid">
            <div class="summary-card">
                <h4>Total Parcels</h4>
                <strong id="totalStat">0</strong>
            </div>
            <div class="summary-card">
                <h4>Delivered</h4>
                <strong id="deliveredStat">0</strong>
            </div>
            <div class="summary-card">
                <h4>Pending</h4>
                <strong id="pendingStat">0</strong>
            </div>
        </div>

        <!-- CLEAR DATA BUTTON -->
        <div style="margin: 1.5rem 0; text-align: right;">
            <button class="btn" onclick="clearAllData()" style="background-color: #ff9800; color: white; padding: 0.6rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500;">
                🗑️ Clear All Parcel Data
            </button>
        </div>

        <!-- ADD PARCEL FORM -->
        <div class="form-section">
            <h3>Add New Parcel</h3>
            
            <form onsubmit="handleAddParcel(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="studentName">Student Name</label>
                        <input type="text" id="studentName" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="phoneNumber">Phone Number (10 digits)</label>
                        <input type="tel" id="phoneNumber" placeholder="9876543210" pattern="\d{10}" maxlength="10" required>
                    </div>

                    <div class="form-group">
                        <label for="source">Source</label>
                        <input type="text" id="source" placeholder="e.g., Amazon, Flipkart, Myntra" required>
                    </div>

                    <div class="form-group">
                        <label for="deliveryPerson">Delivery Person Name</label>
                        <input type="text" id="deliveryPerson" placeholder="Jane Smith" required>
                    </div>

                    <div class="form-group">
                        <label for="deliveryPhone">Delivery Person Phone (10 digits)</label>
                        <input type="tel" id="deliveryPhone" placeholder="9876543210" pattern="\d{10}" maxlength="10" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1rem;">Add Parcel</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        async function checkAdminLogin() {
            const adminLogin = localStorage.getItem('adminLogin');
            if (!adminLogin) {
                window.location.href = 'admin_login.html';
                return;
            }
            
            try {
                const data = JSON.parse(adminLogin);
                if (!data.username) {
                    // Invalid login data
                    localStorage.removeItem('adminLogin');
                    window.location.href = 'admin_login.html';
                    return;
                }
                
                document.getElementById('userDisplay').textContent = '👮 ' + data.username;
                await updateStatistics();
            } catch (e) {
                console.error('Error parsing login data:', e);
                localStorage.removeItem('adminLogin');
                window.location.href = 'admin_login.html';
            }
        }

        function logout() {
            localStorage.removeItem('adminLogin');
            window.location.href = 'role_selection.html';
        }

        async function updateStatistics() {
            try {
                const response = await fetch(`${API_BASE_URL}/dashboard/stats`);
                const stats = await response.json();

                document.getElementById('totalStat').textContent = stats.total;
                document.getElementById('deliveredStat').textContent = stats.delivered;
                document.getElementById('pendingStat').textContent = stats.pending;
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        async function handleAddParcel(event) {
            event.preventDefault();
            
            const studentName = document.getElementById('studentName').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const source = document.getElementById('source').value.trim();
            const deliveryPerson = document.getElementById('deliveryPerson').value.trim();
            const deliveryPhone = document.getElementById('deliveryPhone').value.trim();

            try {
                const response = await fetch(`${API_BASE_URL}/parcels`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_name: studentName,
                        phone: phoneNumber,
                        source: source,
                        delivery_person: deliveryPerson,
                        delivery_phone: deliveryPhone
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || 'Failed to add parcel');
                    return;
                }

                // Show success
                const successMessage = document.getElementById('successMessage');
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 3000);

                // Reset form
                event.target.reset();
                await updateStatistics();
            } catch (error) {
                console.error('Error adding parcel:', error);
                alert('Failed to connect to server. Please try again.');
            }
        }

        checkAdminLogin();
    </script>
</body>
</html>
